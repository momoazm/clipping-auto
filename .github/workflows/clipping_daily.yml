name: Daily MrBeast clipping

# Runs on a SELF-HOSTED runner (your PC). YouTube blocks video DOWNLOADS from GitHub's
# cloud datacenter IPs, so the fetch must happen from a residential IP. The runner must
# be installed + running on your machine (Settings -> Actions -> Runners -> New runner).
# Trade-off vs cloud: your PC has to be on when the schedule fires.

on:
  schedule:
    - cron: "0 13 * * *"   # daily ~13:00 UTC (change to taste)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build clips but do NOT really upload)"
        type: boolean
        default: false
      privacy:
        description: "Upload privacy"
        type: choice
        options: [public, unlisted, private]
        default: public
      limit:
        description: "Max clips this run (blank = config default of 6)"
        type: string
        default: ""

permissions:
  contents: write   # to push the updated clipped_history.json

defaults:
  run:
    shell: bash      # Git Bash (present with Git for Windows)

jobs:
  clip-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false   # keep .venv / wheel cache between runs for speed

      - name: Python venv + deps
        run: |
          if [ ! -d .venv ]; then python -m venv .venv; fi
          .venv/Scripts/python -m pip install --upgrade pip
          .venv/Scripts/python -m pip install -r requirements.txt

      - name: Materialize secrets
        env:
          API_ENV: ${{ secrets.API_ENV }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$API_ENV" > API.env
          printf '%s' "$YT_TOKEN_JSON" > token.json
          test -s API.env   || { echo "::error::API_ENV secret is empty"; exit 1; }
          test -s token.json || { echo "::error::YT_TOKEN_JSON secret is empty"; exit 1; }
          # Cookies are optional on a residential IP (downloads work without them).
          if [ -n "$YOUTUBE_COOKIES" ]; then printf '%s' "$YOUTUBE_COOKIES" > cookies.txt; fi

      - name: Regenerate SFX + music beds
        run: |
          .venv/Scripts/python tools/build_sfx.py
          .venv/Scripts/python tools/build_music.py

      - name: Run daily clipping
        run: |
          ARGS="--privacy ${{ inputs.privacy || 'public' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          echo "run_daily.py $ARGS"
          .venv/Scripts/python run_daily.py $ARGS

      - name: Commit updated history
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/clipped_history.json
          if git diff --staged --quiet; then
            echo "No history change to commit."
          else
            git commit -m "chore: update clipped history [skip ci]"
            git push
          fi
