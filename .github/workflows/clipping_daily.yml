name: Daily Clipping Automation

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      # --- THIS STEP GRABS REPO SECRETS AND WRITES THEM INTO API.ENV ---
      - name: Materialize secrets
        env:
          ZERNIO_API: ${{ secrets.ZERNIO_API }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
        run: |
          echo "ZERNIO_API=$ZERNIO_API" > API.env
          echo "ZERNIO_INSTAGRAM_ID=$ZERNIO_INSTAGRAM_ID" >> API.env
          echo "ZERNIO_YOUTUBE_ID=$ZERNIO_YOUTUBE_ID" >> API.env

      - name: Execute Automation Pipeline
        run: python run_daily.py
