name: Daily MrBeast clipping

# HYBRID since 2026-07-10. YouTube began serving degraded <=360p format ladders to
# BOTH the WARP egress AND GitHub's datacenter range -- even with valid BgUtils PO
# tokens and the tv-first client chain (every source x every route failed on
# 07-09/07-10). The ONE step that needs YouTube -- downloading the source video --
# now runs on the self-hosted "laptop" runner (residential IP, no bot wall) and
# hands the file to the cloud job as an artifact. Everything heavy (transcribe,
# render, upload) stays on free GitHub-hosted runners, so the laptop is busy for
# minutes, not the whole run. If the laptop is offline the download job just waits
# in the queue until the runner comes online (GitHub holds queued jobs ~24h).
#
# Exact-time posting: GitHub cron can drift 5-30+ min, so the cron fires ~40 min
# EARLY; the download job uses that head start, and the cloud job's "Hold until
# slot" step sleeps until the exact target minute before clipping + posting.

on:
  schedule:
    # TWO runs a day, each clipping a DIFFERENT source video (the committed no-repeat
    # history makes the second run skip the first run's pick) -> up to 2x clips_per_day
    # Shorts daily. Crons fire ~40 min early; the hold step releases at the exact slot.
    #   16:30 UTC = 12:30pm New York / 7:30pm Cairo  (US midday Shorts window)
    #   22:30 UTC =  6:30pm New York / 1:30am Cairo  (US evening Shorts window)
    - cron: "50 15 * * *"
    - cron: "50 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build clips but do NOT really upload)"
        type: boolean
        default: false
      privacy:
        description: "Upload privacy"
        type: choice
        options: [public, unlisted, private]
        default: public
      limit:
        description: "Max clips this run (blank = config default of 6)"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  # ---- Laptop half: the only step YouTube can bot-wall ----------------------
  download-source:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          # Keep the crash-safe local ledger (state/attempted_local.json) between
          # runs on this machine -- it's what prevents re-clipping after a crash.
          clean: false

      - name: Python deps (download half only)
        shell: powershell
        run: python -m pip install --quiet --upgrade yt-dlp python-dotenv requests

      - name: Find + download today's source (residential IP)
        shell: powershell
        env:
          IN_DRYRUN: ${{ inputs.dry_run }}
        run: |
          $cli = @("run_daily.py", "--download-only")
          if ($env:IN_DRYRUN -eq "true") { $cli += "--dry-run" }
          Write-Host "run_daily.py $($cli -join ' ')"
          python @cli
          exit $LASTEXITCODE

      - name: Publish source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-video
          path: |
            .tmp/source.mp4
            .tmp/source_meta.json
          retention-days: 1
          if-no-files-found: error

      # failure() so sources whose download failed are still committed to the
      # no-repeat memory (otherwise the next run re-picks the same broken video).
      - name: Commit updated history (failed attempts)
        if: ${{ failure() && inputs.dry_run != 'true' }}
        shell: powershell
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/clipped_history.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update clipped history [skip ci]"
            git pull --rebase origin main
            git push
          } else {
            Write-Host "No history change to commit."
          }

  # ---- Cloud half: transcribe, select, render, upload -----------------------
  clip-and-upload:
    needs: download-source
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Hold until the exact slot time (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'EOF'
          # GitHub cron fires early on purpose (and drifts); pin the real start to the slot.
          import datetime, time
          SLOTS_UTC = ["16:30", "22:30"]
          now = datetime.datetime.now(datetime.timezone.utc)
          waits = []
          for s in SLOTS_UTC:
              h, m = map(int, s.split(":"))
              t = now.replace(hour=h, minute=m, second=0, microsecond=0)
              for d in (0, 1):
                  delta = (t + datetime.timedelta(days=d) - now).total_seconds()
                  if 0 <= delta <= 55 * 60:
                      waits.append(delta)
          if waits:
              w = min(waits)
              print(f"Sleeping {w:.0f}s until the exact slot...")
              time.sleep(w)
          else:
              print("Cron fired past the slot; running immediately.")
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass, OpenCV libs, brand font)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libgl1 fonts-liberation
          mkdir -p ~/.local/share/fonts
          cp brand/fonts/*.ttf ~/.local/share/fonts/
          fc-cache -f

      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Materialize secrets
        env:
          API_ENV: ${{ secrets.API_ENV }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: |
          python3 - <<'EOF'
          import os
          with open('API.env', 'w', encoding='utf-8') as f:
              f.write(os.environ.get('API_ENV', '') + '\n')
          with open('token.json', 'w', encoding='utf-8') as f:
              f.write(os.environ.get('YT_TOKEN_JSON', ''))
          EOF
          [ -s API.env ]    || { echo "::error::API_ENV secret is empty"; exit 1; }
          [ -s token.json ] || { echo "::error::YT_TOKEN_JSON secret is empty"; exit 1; }
          rm -f cookies.txt

      - name: Regenerate SFX + music beds
        run: |
          python tools/build_sfx.py
          python tools/build_music.py

      - name: Fetch source artifact (downloaded by the laptop job)
        uses: actions/download-artifact@v4
        with:
          name: source-video
          path: .tmp

      - name: Run daily clipping
        env:
          IN_PRIVACY: ${{ inputs.privacy }}
          IN_DRYRUN: ${{ inputs.dry_run }}
          IN_LIMIT: ${{ inputs.limit }}
          # Zernio creds straight from their own secrets -- read via os.environ, never written to API.env
          ZERNIO_API: ${{ secrets.ZERNIO_API }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
        run: |
          ARGS=(--privacy "${IN_PRIVACY:-public}")
          ARGS+=(--source .tmp/source.mp4 --source-meta .tmp/source_meta.json)
          if [ "$IN_DRYRUN" == "true" ]; then ARGS+=(--dry-run); fi
          if [ -n "$IN_LIMIT" ]; then ARGS+=(--limit "$IN_LIMIT"); fi
          echo "run_daily.py ${ARGS[*]}"
          python run_daily.py "${ARGS[@]}"

      # always() so the no-repeat memory is committed even when the run FAILS -- that's
      # how a source that broke this run gets remembered and isn't re-picked next time
      # (without it, the next checkout resets the file and the same video repeats).
      - name: Commit updated history
        if: ${{ always() && inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/clipped_history.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update clipped history [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "No history change to commit."
          fi
