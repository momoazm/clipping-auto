name: Daily MrBeast clipping

# ALL-CLOUD again since 2026-07-11 (Moemen's call -- supersedes the 2026-07-10 hybrid).
# The hybrid's self-hosted download job queued for HOURS whenever the laptop was off
# (GitHub holds queued jobs ~24h), so slots were missed and the laptop got hijacked at
# boot. Everything now runs on GitHub-hosted Ubuntu runners -- no laptop, ever.
#
# YouTube bot-checks datacenter IPs. Defense layers: (1) a BgUtils PO-token provider
# (Docker, localhost:4416) mints proof-of-origin tokens for the web/tv clients, and
# (2) Cloudflare WARP's local SOCKS proxy gives a cleaner egress IP. Since 2026-07-09
# YouTube sometimes walls EVERY datacenter route down to a <=360p ladder even so.
# 2026-07-11 added YTDLP_DEGRADED_MIN=360 to post a soft Short on those days instead
# of failing the run -- but that shipped visibly low-res Shorts, and Moemen's call
# 2026-07-12 is quality over volume. The fallback is OFF again: download_video.py's
# own --min-height floor (1080) now fails the run LOUDLY on a bot-walled day instead
# of posting one -- a missed slot beats a soft clip.
#
# Exact-time posting: GitHub cron can drift 5-30+ min, so the cron fires ~40 min
# EARLY and the "Hold until slot" step sleeps until the exact target minute.

on:
  schedule:
    # TWO runs a day, each clipping a DIFFERENT source video (the committed no-repeat
    # history makes the second run skip the first run's pick) -> up to 2x clips_per_day
    # Shorts daily. Crons fire ~40 min early; the hold step releases at the exact slot.
    #   16:30 UTC = 12:30pm New York / 7:30pm Cairo  (US midday Shorts window)
    #   22:30 UTC =  6:30pm New York / 1:30am Cairo  (US evening Shorts window)
    - cron: "50 15 * * *"
    - cron: "50 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build clips but do NOT really upload)"
        type: boolean
        default: false
      privacy:
        description: "Upload privacy"
        type: choice
        options: [public, unlisted, private]
        default: public
      limit:
        description: "Max clips this run (blank = config default of 6)"
        type: string
        default: ""

permissions:
  contents: write

jobs:
  clip-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v5

      - name: Hold until the exact slot time (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          python3 - <<'EOF'
          # GitHub cron fires early on purpose (and drifts); pin the real start to the slot.
          import datetime, time
          SLOTS_UTC = ["16:30", "22:30"]
          now = datetime.datetime.now(datetime.timezone.utc)
          waits = []
          for s in SLOTS_UTC:
              h, m = map(int, s.split(":"))
              t = now.replace(hour=h, minute=m, second=0, microsecond=0)
              for d in (0, 1):
                  delta = (t + datetime.timedelta(days=d) - now).total_seconds()
                  if 0 <= delta <= 55 * 60:
                      waits.append(delta)
          if waits:
              w = min(waits)
              print(f"Sleeping {w:.0f}s until the exact slot...")
              time.sleep(w)
          else:
              print("Cron fired past the slot; running immediately.")
          EOF

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: System deps (ffmpeg w/ libass, OpenCV libs, brand font)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg libgl1 fonts-liberation
          mkdir -p ~/.local/share/fonts
          cp brand/fonts/*.ttf ~/.local/share/fonts/
          fc-cache -f

      - name: Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # YouTube breaks old yt-dlp builds constantly; force the latest every run.
          pip install --upgrade yt-dlp
          # PO-token provider plugin: yt-dlp auto-discovers it and mints proof-of-origin
          # tokens (via the localhost provider below) so the web/tv clients pass the
          # "confirm you're not a bot" wall on datacenter IPs. Free, no key, no account.
          pip install --upgrade bgutil-ytdlp-pot-provider

      - name: Start Cloudflare WARP (SOCKS proxy for yt-dlp egress)
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          # Registration can flake when many runners share an IP; retry a few times.
          for i in 1 2 3 4; do
            warp-cli --accept-tos registration new && break || sleep 15
          done
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          # Poll until actually Connected -- a fixed 5s sleep is flaky (status can still be
          # "Connecting", making every proxied yt-dlp download fail instantly).
          for i in $(seq 1 40); do
            if warp-cli --accept-tos status | grep -q "Connected"; then echo "WARP connected"; break; fi
            sleep 3
          done
          warp-cli --accept-tos status
          if ! curl -s --max-time 25 --proxy socks5h://127.0.0.1:40000 https://ifconfig.me; then
            echo "::error::WARP proxy egress check failed -- yt-dlp would be bot-blocked"; exit 1
          fi
          echo

      - name: Start PO-token provider (BgUtils, defeats YouTube bot-check)
        run: |
          # Prebuilt Docker image mints proof-of-origin tokens on localhost:4416. The
          # bgutil yt-dlp plugin (installed above) auto-discovers it at the default
          # IP/port, so the web/tv clients get valid POTs and downloads stop bot-blocking.
          # The container talks to the internet directly (WARP proxy only affects apps
          # pointed at its SOCKS port), so token generation isn't affected by WARP.
          docker run --name bgutil-provider -d --init -p 4416:4416 \
            brainicism/bgutil-ytdlp-pot-provider
          # Wait until the token server answers before we start downloading.
          for i in $(seq 1 30); do
            if curl -s --max-time 5 http://127.0.0.1:4416/ >/dev/null 2>&1; then
              echo "POT provider up"; break
            fi
            sleep 2
          done
          # Soft check that yt-dlp actually loaded the plugin (verbose prints the providers).
          if yt-dlp -v --simulate --no-warnings "https://www.youtube.com/watch?v=BaW_jenozKc" 2>&1 \
               | grep -q "PO Token Providers: bgutil"; then
            echo "yt-dlp sees the bgutil POT provider"
          else
            echo "::warning::yt-dlp did not report the bgutil POT provider -- downloads may still bot-block"
          fi

      - name: Materialize secrets
        env:
          API_ENV: ${{ secrets.API_ENV }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: |
          python3 - <<'EOF'
          import os
          with open('API.env', 'w', encoding='utf-8') as f:
              f.write(os.environ.get('API_ENV', '') + '\n')
          with open('token.json', 'w', encoding='utf-8') as f:
              f.write(os.environ.get('YT_TOKEN_JSON', ''))
          EOF
          [ -s API.env ]    || { echo "::error::API_ENV secret is empty"; exit 1; }
          [ -s token.json ] || { echo "::error::YT_TOKEN_JSON secret is empty"; exit 1; }
          rm -f cookies.txt

      - name: Regenerate SFX + music beds
        run: |
          python tools/build_sfx.py
          python tools/build_music.py

      - name: Run daily clipping
        env:
          # Route yt-dlp (and only yt-dlp) through WARP -- see tools/download_video.py.
          YTDLP_PROXY: socks5://127.0.0.1:40000
          # ...but NOT the PO-token provider call: it lives on localhost and must bypass
          # the SOCKS proxy or the token fetch fails (and downloads bot-block again).
          # (Python's proxy-bypass check lowercases env names, so one key covers both.)
          no_proxy: "127.0.0.1,localhost"
          # No YTDLP_DEGRADED_MIN (removed 2026-07-12): quality over volume -- see header
          # comment. download_video.py's --min-height 1080 floor fails the run loudly
          # instead of accepting a degraded <=360p ladder.
          IN_PRIVACY: ${{ inputs.privacy }}
          IN_DRYRUN: ${{ inputs.dry_run }}
          IN_LIMIT: ${{ inputs.limit }}
          # Zernio creds straight from their own secrets -- read via os.environ, never written to API.env
          ZERNIO_API: ${{ secrets.ZERNIO_API }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
        run: |
          ARGS=(--privacy "${IN_PRIVACY:-public}")
          if [ "$IN_DRYRUN" == "true" ]; then ARGS+=(--dry-run); fi
          if [ -n "$IN_LIMIT" ]; then ARGS+=(--limit "$IN_LIMIT"); fi
          echo "run_daily.py ${ARGS[*]}"
          python run_daily.py "${ARGS[@]}"

      # always() so the no-repeat memory is committed even when the run FAILS -- that's
      # how a source that broke this run gets remembered and isn't re-picked next time
      # (without it, the next checkout resets the file and the same video repeats).
      - name: Commit updated history
        if: ${{ always() && inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/clipped_history.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update clipped history [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "No history change to commit."
          fi
