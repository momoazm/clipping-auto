name: Daily Clipping Automation

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

defaults:
  run:
    shell: powershell

jobs:
  run-pipeline:
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # We do NOT touch or overwrite API.env here anymore to protect your old keys

      - name: Execute Automation Pipeline
        env:
          ZERNIO_API: ${{ secrets.ZERNIO_API }}
          ZERNIO_INSTAGRAM_ID: ${{ secrets.ZERNIO_INSTAGRAM_ID }}
          ZERNIO_YOUTUBE_ID: ${{ secrets.ZERNIO_YOUTUBE_ID }}
        run: python run_daily.py
