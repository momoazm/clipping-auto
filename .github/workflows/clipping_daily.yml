name: Daily MrBeast clipping

# Runs on a SELF-HOSTED runner (your PC). YouTube blocks video DOWNLOADS from GitHub's
# cloud datacenter IPs, so the fetch must happen from a residential IP. Steps use
# PowerShell (Windows PowerShell 5.1, always present) — not bash, which on this machine
# resolves to a broken WSL bash.

on:
  schedule:
    # 21:00 UTC == 00:00 Arab Standard Time (UTC+3), i.e. local midnight. GitHub
    # creates exactly one run per day; the self-hosted runner is woken at local
    # midnight to pick it up (see the "run-once-awake" scheduled task on the PC).
    # A queued run waits up to ~24h for the runner as a fallback.
    - cron: "0 21 * * *"
  workflow_dispatch:   # manual — trigger from Actions -> Run workflow
    inputs:
      dry_run:
        description: "Dry run (build clips but do NOT really upload)"
        type: boolean
        default: false
      privacy:
        description: "Upload privacy"
        type: choice
        options: [public, unlisted, private]
        default: public
      limit:
        description: "Max clips this run (blank = config default of 6)"
        type: string
        default: ""

permissions:
  contents: write

defaults:
  run:
    shell: powershell

jobs:
  clip-and-upload:
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false   # keep .venv / wheel cache between runs for speed

      - name: Python venv + deps
        run: |
          if (-not (Test-Path ".venv")) { python -m venv .venv }
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          & $py -m pip install --upgrade pip
          & $py -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Materialize secrets
        env:
          API_ENV: ${{ secrets.API_ENV }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: |
          $root = Get-Location
          [System.IO.File]::WriteAllText("$root\API.env", $env:API_ENV)
          [System.IO.File]::WriteAllText("$root\token.json", $env:YT_TOKEN_JSON)
          if (-not (Test-Path "API.env")   -or (Get-Item "API.env").Length   -eq 0) { Write-Host "::error::API_ENV secret is empty"; exit 1 }
          if (-not (Test-Path "token.json") -or (Get-Item "token.json").Length -eq 0) { Write-Host "::error::YT_TOKEN_JSON secret is empty"; exit 1 }
          # NOTE: no cookies on this self-hosted/residential runner — with cookies yt-dlp
          # switches to the PO-token-gated web client and gets no formats; cookieless uses
          # the android_vr client which serves formats fine. Remove any stale cookies.txt.
          if (Test-Path "$root\cookies.txt") { Remove-Item "$root\cookies.txt" -Force }

      - name: Ensure full ffmpeg on PATH
        # The pipeline needs the system ffmpeg (Gyan full build: libmp3lame for
        # music MP3s, libass for caption burning). Without it, _common.ffmpeg_bin()
        # falls back to imageio_ffmpeg, which lazily downloads its own binary on
        # first use -- a flaky network step that broke the music build. Put the real
        # ffmpeg on PATH for every later step (or fail loudly if it's missing).
        run: |
          $ff = (Get-Command ffmpeg -ErrorAction SilentlyContinue).Source
          if (-not $ff) {
            $c = Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Recurse -Filter ffmpeg.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($c) { $ff = $c.FullName }
          }
          if (-not $ff) { Write-Host "::error::ffmpeg not found on the runner. Install it: winget install Gyan.FFmpeg"; exit 1 }
          $dir = Split-Path $ff
          Add-Content -Path $env:GITHUB_PATH -Value $dir
          Write-Host "Using ffmpeg: $ff"

      - name: Prepare background-music bed
        # SFX are disabled (render runs with --no-sfx), so we no longer build them.
        # The background bed is the audio extracted from config.background_music_url
        # (run_daily also does this via resolve_music_bed; doing it here surfaces a
        # download failure as its own step). build_music.py stays as the synth fallback.
        run: |
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          & $py tools\build_music.py

      - name: Run daily clipping
        env:
          IN_PRIVACY: ${{ inputs.privacy }}
          IN_DRYRUN: ${{ inputs.dry_run }}
          IN_LIMIT: ${{ inputs.limit }}
        run: |
          $py = Join-Path (Get-Location) ".venv\Scripts\python.exe"
          $argv = @("--privacy", $(if ($env:IN_PRIVACY) { $env:IN_PRIVACY } else { "public" }))
          if ($env:IN_DRYRUN -eq "true") { $argv += "--dry-run" }
          if ($env:IN_LIMIT) { $argv += @("--limit", $env:IN_LIMIT) }
          # Keep the machine awake for the whole (slow) run. On this laptop runner an
          # idle sleep mid-run disconnects the runner and GitHub cancels the job
          # (KeyboardInterrupt / "operation was canceled"). SetThreadExecutionState with
          # ES_CONTINUOUS|ES_SYSTEM_REQUIRED blocks idle sleep while this helper lives;
          # the finally{} stops it so normal sleep resumes. (Closing the lid still
          # sleeps -- keep the lid open and plugged in.)
          $awake = Start-Process $py -ArgumentList "-c","import ctypes,time; ctypes.windll.kernel32.SetThreadExecutionState(0x80000001); time.sleep(86400)" -PassThru -WindowStyle Hidden
          try {
            Write-Host "run_daily.py $argv"
            & $py run_daily.py @argv
            if ($LASTEXITCODE -ne 0) { exit 1 }
          } finally {
            Stop-Process -Id $awake.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Commit updated history
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/clipped_history.json
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update clipped history [skip ci]"
            git push
          } else {
            Write-Host "No history change to commit."
          }
