name: Cloud IP probe (temporary)

# TEMPORARY diagnostic: tests whether a GitHub-hosted (datacenter-IP) runner can
# still reach the pipeline's data sources today. No uploads, no state changes.
# Delete this file once the self-hosted -> cloud decision is made.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp + ffmpeg
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: "TEST 1: Reddit RSS feed (ranking-shorts source discovery)"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import urllib.request, re, sys
          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                "(KHTML, like Gecko) Chrome/124.0 Safari/537.36")
          url = "https://www.reddit.com/r/Whatcouldgowrong/top/.rss?t=week"
          req = urllib.request.Request(url, headers={"User-Agent": UA})
          try:
              body = urllib.request.urlopen(req, timeout=30).read().decode("utf-8", "replace")
          except Exception as e:
              print(f"RESULT reddit_rss=FAIL {e}")
              sys.exit(1)
          vids = re.findall(r"https://v\.redd\.it/[a-z0-9]+", body)
          print(f"RESULT reddit_rss=OK entries_with_vreddit={len(set(vids))}")
          with open("/tmp/vreddit_url.txt", "w") as f:
              f.write(sorted(set(vids))[0] if vids else "")
          EOF

      - name: "TEST 2: v.redd.it download via yt-dlp (ranking-shorts clip download)"
        continue-on-error: true
        run: |
          URL=$(cat /tmp/vreddit_url.txt 2>/dev/null || true)
          if [ -z "$URL" ]; then echo "RESULT vreddit_dl=SKIP no url from RSS"; exit 0; fi
          echo "Trying $URL"
          if yt-dlp -f "b[height<=480]/b" --max-filesize 200M -o /tmp/probe_reddit.mp4 "$URL"; then
            ls -la /tmp/probe_reddit.mp4 && echo "RESULT vreddit_dl=OK"
          else
            echo "RESULT vreddit_dl=FAIL"; exit 1
          fi

      - name: "TEST 3: YouTube metadata + download, plain yt-dlp (clipping-auto source)"
        continue-on-error: true
        run: |
          # A MrBeast upload; 360p + first 30s only to keep it tiny but exercise the real video CDN path.
          if yt-dlp -f "bv*[height<=360]+ba/b[height<=360]" --download-sections "*0-30" \
               -o /tmp/probe_yt.mp4 "https://www.youtube.com/watch?v=0e3GPea1Tyg"; then
            ls -la /tmp/probe_yt.* && echo "RESULT youtube_plain=OK"
          else
            echo "RESULT youtube_plain=FAIL"; exit 1
          fi

      - name: "TEST 4: YouTube with bgutil PO-token provider"
        continue-on-error: true
        run: |
          docker run --name bgutil -d -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider
          pip install bgutil-ytdlp-pot-provider
          sleep 5
          if yt-dlp -f "bv*[height<=360]+ba/b[height<=360]" --download-sections "*0-30" \
               -o /tmp/probe_yt_pot.mp4 "https://www.youtube.com/watch?v=0e3GPea1Tyg"; then
            ls -la /tmp/probe_yt_pot.* && echo "RESULT youtube_pot=OK"
          else
            echo "RESULT youtube_pot=FAIL"; exit 1
          fi

      - name: "Install Cloudflare WARP (SOCKS proxy mode, free egress IP change)"
        continue-on-error: true
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y -qq cloudflare-warp
          pip install pysocks
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5
          warp-cli --accept-tos status
          echo "Egress IP via WARP:"
          curl -s --proxy socks5h://127.0.0.1:40000 https://ifconfig.me || true

      - name: "TEST 5: v.redd.it via WARP proxy"
        continue-on-error: true
        run: |
          URL=$(cat /tmp/vreddit_url.txt 2>/dev/null || true)
          if [ -z "$URL" ]; then echo "RESULT vreddit_warp=SKIP no url"; exit 0; fi
          if yt-dlp --proxy socks5://127.0.0.1:40000 -f "b[height<=480]/b" \
               --max-filesize 200M -o /tmp/probe_reddit_warp.mp4 "$URL"; then
            ls -la /tmp/probe_reddit_warp.mp4 && echo "RESULT vreddit_warp=OK"
          else
            echo "RESULT vreddit_warp=FAIL"; exit 1
          fi

      - name: "TEST 6: YouTube via WARP proxy (with PO-token provider still up)"
        continue-on-error: true
        run: |
          if yt-dlp --proxy socks5://127.0.0.1:40000 -f "bv*[height<=360]+ba/b[height<=360]" \
               --download-sections "*0-30" -o /tmp/probe_yt_warp.mp4 \
               "https://www.youtube.com/watch?v=0e3GPea1Tyg"; then
            ls -la /tmp/probe_yt_warp.* && echo "RESULT youtube_warp=OK"
          else
            echo "RESULT youtube_warp=FAIL"; exit 1
          fi

      - name: "TEST 7: YouTube via WARP, native downloader (no ffmpeg sections)"
        continue-on-error: true
        run: |
          # ffmpeg can't speak SOCKS, so download a whole small file with yt-dlp's own downloader.
          if yt-dlp --proxy socks5://127.0.0.1:40000 -f "b[height<=360]/bv*[height<=360]+ba" \
               --max-filesize 300M -o "/tmp/probe_yt_native.%(ext)s" \
               "https://www.youtube.com/watch?v=0e3GPea1Tyg"; then
            ls -la /tmp/probe_yt_native.* && echo "RESULT youtube_warp_native=OK"
          else
            echo "RESULT youtube_warp_native=FAIL"; exit 1
          fi

      - name: "TEST 8: Reddit alternate media endpoints (JSON -> direct files)"
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import json, urllib.request, re
          UA = ("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 "
                "(KHTML, like Gecko) Chrome/124.0 Safari/537.36")
          def get(url, proxy=None, binary=False, rng=None):
              h = {"User-Agent": UA, "Accept": "*/*"}
              if rng: h["Range"] = rng
              req = urllib.request.Request(url, headers=h)
              if proxy:
                  req.set_proxy(proxy, "http"); req.set_proxy(proxy, "https")
              r = urllib.request.urlopen(req, timeout=30)
              return r.read(65536) if binary else r.read().decode("utf-8", "replace")
          # 1) post listing JSON from www.reddit.com (plain IP)
          try:
              body = get("https://www.reddit.com/r/Whatcouldgowrong/top.json?t=week&limit=25")
              posts = json.loads(body)["data"]["children"]
              print(f"RESULT reddit_json=OK posts={len(posts)}")
          except Exception as e:
              print(f"RESULT reddit_json=FAIL {e}"); raise SystemExit(0)
          vid = None
          for p in posts:
              d = p["data"]
              if d.get("is_video") and d.get("media", {}).get("reddit_video"):
                  vid = d["media"]["reddit_video"]; break
          if not vid:
              print("RESULT reddit_media=SKIP no video post"); raise SystemExit(0)
          fallback = vid.get("fallback_url", "").split("?")[0]
          print("fallback_url:", fallback)
          # 2) direct DASH mp4 from v.redd.it, plain IP, browser headers + Range
          for label, proxy in (("plain", None),):
              try:
                  data = get(fallback, proxy=proxy, binary=True, rng="bytes=0-65535")
                  print(f"RESULT vreddit_dash_{label}=OK bytes={len(data)}")
              except Exception as e:
                  print(f"RESULT vreddit_dash_{label}=FAIL {e}")
          # 3) packaged-media (if present)
          pm = vid.get("packaged_media") or {}
          mp4s = (pm.get("mp4") or {}).get("permalink") if isinstance(pm.get("mp4"), dict) else None
          if mp4s:
              try:
                  data = get(mp4s, binary=True, rng="bytes=0-65535")
                  print(f"RESULT packaged_media=OK bytes={len(data)}")
              except Exception as e:
                  print(f"RESULT packaged_media=FAIL {e}")
          else:
              print("RESULT packaged_media=SKIP not in listing JSON")
          EOF

      - name: "TEST 9: v.redd.it DASH file via WARP with browser headers"
        continue-on-error: true
        run: |
          URL=$(cat /tmp/vreddit_url.txt 2>/dev/null || true)
          if [ -z "$URL" ]; then echo "RESULT vreddit_dash_warp=SKIP"; exit 0; fi
          # try the direct 720p DASH file on the CDN through WARP
          if curl -sf --proxy socks5h://127.0.0.1:40000 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
               -r 0-65535 -o /tmp/dash_warp.bin "$URL/DASH_720.mp4"; then
            ls -la /tmp/dash_warp.bin && echo "RESULT vreddit_dash_warp=OK"
          else
            echo "RESULT vreddit_dash_warp=FAIL"; exit 1
          fi
